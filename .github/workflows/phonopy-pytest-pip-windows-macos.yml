name: phonopy test on windows and macos

on:
  pull_request:
    branches: [ develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'  # Use 3.12 to avoid _tkinter.TclError: Can't find a usable init.tcl in the following directories at python 3.13
    - name: Setup phonopy
      run: |
        pip install -e . -v
    - name: Test with pytest
      run: |
        pip install pytest
        pytest -v test

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v6
    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
    - name: Install dependencies
      run: |
        conda activate test
        conda install --yes -c conda-forge python=3.13
        conda install --yes -c conda-forge matplotlib-base pyyaml scipy numpy spglib h5py pip pytest codecov pytest-cov c-compiler cxx-compiler cmake pypolymlp ase
    - name: Setup symfc
      run: |
        conda activate test
        git clone --depth 1 https://github.com/symfc/symfc.git
        cd symfc
        pip install -e . -vvv
        cd ..
    - name: Setup phonopy
      run: |
        conda activate test
        pip install -e . -vvv
    - name: Test with pytest
      run: |
        conda activate test
        pytest -v test
