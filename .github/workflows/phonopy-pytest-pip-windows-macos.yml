name: phonopy test on windows and macos

on:
  pull_request:
    branches: [ develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'  # Use 3.12 to avoid _tkinter.TclError: Can't find a usable init.tcl in the following directories at python 3.13
    - name: Setup phonopy
      run: |
        pip install -e . -v
    - name: Test with pytest
      run: |
        pip install pytest
        pytest -v test

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Setup phonopy
      run: |
        pip install -e . -v
    - name: Test with pytest
      run: |
        pip install pytest
        pytest -v test
