name: Release

# Build sdist + binary wheels and publish in one shot.
#
# - Push a tag "v*" (e.g. v4.1.0) -> publish to PyPI.
# - Run manually (workflow_dispatch)  -> publish to TestPyPI.
#
# Publishing uses PyPI Trusted Publishing (OIDC); no API token secret is
# needed.  The phonopy project must register this workflow as a trusted
# publisher on PyPI and TestPyPI, and the "pypi" / "testpypi" GitHub
# environments must exist.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
          - windows-11-arm

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so setuptools_scm derives the version
          # from the pushed "v*" tag instead of a dev/dirty fallback.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.3.0

      - name: Build wheels on ubuntu
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: "cp39-* pp* *_i686 *musllinux*"
          CIBW_BUILD_VERBOSITY: 1

      - name: Build wheels on macos
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: "cp39-* pp*"
          CIBW_BUILD_VERBOSITY: 1

      - name: Build wheels on windows
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: "cp39-* cp310-win_arm64 cp*-win32 pp*"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish_testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/phonopy
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true

  publish_pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/phonopy
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
