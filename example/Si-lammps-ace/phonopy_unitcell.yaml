unit_cell:
  # Experimental room-temperature (~300 K) lattice constant of silicon,
  # a = 5.431 A, so the FCC basis vector component is a / 2 = 2.71550 A.
  lattice:
    - [0.000000000000000, 2.715500000000000, 2.715500000000000] # a
    - [2.715500000000000, 0.000000000000000, 2.715500000000000] # b
    - [2.715500000000000, 2.715500000000000, 0.000000000000000] # c
  points:
    - symbol: Si # 1
      coordinates: [0.000000000000000, 0.000000000000000, 0.000000000000000]
    - symbol: Si # 2
      coordinates: [0.250000000000000, 0.250000000000000, 0.250000000000000]
